<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WRD Armory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a0c10; }
    :root { --wrd-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, monospace; }

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a3040; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a4050; }
    .sr > .dr:last-child { border-bottom: none !important; }
